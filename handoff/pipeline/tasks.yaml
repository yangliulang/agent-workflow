# Pipeline 任务定义（唯一 Prompt 正文源）
# 指挥官调用见 handoff/pipeline/COMMANDER.md
#
# 功能占位符：{{feat}} → 2026-05-25--greeting；{{feature_dir}} → {{features_root}}/{{feat}}/
#
# 项目占位符（执行前读 pipeline.project.yaml，或 ./scripts/lib/read-pipeline-project.sh pp_print_context）：
#   {{features_root}} {{backend_path}} {{frontend_path}}
#   {{api_base_url}} {{web_dev_url}} {{prd_path}} {{default_roadmap}}
#
# 本仓库默认值（与 pipeline.project.yaml 一致）：
#   features_root=handoff/features  backend_path=apps/api  frontend_path=apps/web
#   api_base_url=http://localhost:3000/api  web_dev_url=http://localhost:5173
#   prd_path=PRD-simple.md  default_roadmap=handoff/roadmap/phase-1.md

tasks:
  product.plan:
    agent: product-agent
    title: 阶段规划（roadmap）
    requires_next: null
    target_phase: null
    steps: |
      你是 product-agent。遵守 .cursor/rules/product-agent.mdc 与 handoff/conventions/product.md。
      读取 pipeline.project.yaml（PRD 默认路径见 project.prd.primary，当前示例 {{prd_path}}）。
      根据指挥官提供的 PRD/描述，创建或更新 handoff/roadmap/phase-N.md：
      阶段目标、backlog（功能 ID、优先级、依赖）、本阶段不做。
      不写各功能包内的 brief / OpenAPI。
      完成后对照 handoff/pipeline/checklists/product-plan.md 逐项自检；
      在回复中列出未勾选项（应为无），并提示指挥官确认后再 product.contract。

  product.contract:
    agent: product-agent
    title: 建包定稿
    requires_next: product-agent
    allowed_phase: [planned]
    steps: |
      你是 product-agent。遵守 .cursor/rules/product-agent.mdc。
      阅读 {{default_roadmap}}，处理优先级最高且状态为 planned 的功能；
      若指挥官指定了 {{feat}}，则只处理该功能。
      功能包：{{feature_dir}}（不存在则运行 ./scripts/new-feature.sh {{feat}} "标题"）。
      完成 brief.md、api.openapi.yaml；
      必填 test/coverage.md、test/cases.md、test/e2e-cases.md（有页面时 E2E 必填；无页面可标「含页面：否」并省略 E2E 列要求）。
      可选 design/ui-review.md 骨架。
      定稿前对照 handoff/pipeline/checklists/contract-test-coverage.md；
      运行 ./scripts/check-test-coverage.sh {{feature_dir}}，退出码非 0 则禁止 contract_ready。
      通过后再更新 status.yaml → contract_ready，next: backend-agent；同步 roadmap 状态。

  product.accept:
    agent: product-agent
    title: 产品验收
    requires_next: product-agent
    allowed_phase: [ui_reviewed]
    steps: |
      你是 product-agent。处理 {{feature_dir}}，phase 为 ui_reviewed。
      对照 brief.md 与 design/ui-review.md 逐项验收。
      通过 → status.yaml phase: done，next: null；同步 roadmap 为 done。

  backend.implement:
    agent: backend-agent
    title: 实现 API
    requires_next: backend-agent
    allowed_phase: [contract_ready, backend_in_progress]
    steps: |
      你是 backend-agent。遵守 .cursor/rules/backend-agent.mdc 与 api-dev 规范。
      处理 {{feature_dir}}，实现 api.openapi.yaml，代码在 {{backend_path}}/。
      填写 backend/notes.md，自测通过后 status.yaml → backend_done，next: test-agent。

  test.prepare:
    agent: test-agent
    title: 用例复审（contract_ready 后推荐）
    requires_next: null
    allowed_phase: [contract_ready]
    steps: |
      你是 test-agent。处理 {{feature_dir}}，phase 为 contract_ready（或指挥官显式指定）。
      复审并完善 test/coverage.md、test/cases.md、test/e2e-cases.md（P0 步骤/预期、AC 追溯）。
      运行 ./scripts/check-test-coverage.sh {{feature_dir}}，须退出码 0。
      不改 status.yaml；若发现 AC/契约缺陷，在回复中说明并建议退回 product-agent。

  test.api:
    agent: test-agent
    title: API 测试
    requires_next: test-agent
    allowed_phase: [backend_done]
    steps: |
      你是 test-agent。遵守 .cursor/rules/test-agent.mdc。
      处理 {{feature_dir}}，phase 为 backend_done，next 为 test-agent。
      启动后端，执行 test/cases.md 全部 P0，填写 test/report.md。
      P0 全通过 → tested，next: frontend-agent。
      P0 失败 → phase 保持 backend_done，blockers + report，next: backend-agent。

  test.e2e:
    agent: test-agent
    title: E2E 验证
    requires_next: test-agent
    allowed_phase: [frontend_done]
    steps: |
      你是 test-agent。处理 {{feature_dir}}，phase 为 frontend_done，next 为 test-agent。
      启动前后端，执行 test/e2e-cases.md 全部 P0，填写 test/e2e-report.md。
      P0 全通过 → e2e_verified，next: designer-agent。
      P0 失败 → phase 保持 frontend_done，blockers + e2e-report，next: frontend-agent（或 backend-agent）。

  test.e2e-retest:
    agent: test-agent
    title: E2E 复测
    requires_next: test-agent
    allowed_phase: [frontend_done]
    steps: |
      你是 test-agent。处理 {{feature_dir}}，phase 为 frontend_done，next 为 test-agent，blockers 为空。
      复测此前失败的 E2E P0，更新 test/e2e-report.md，通过 → e2e_verified，next: designer-agent。

  frontend.mock:
    agent: frontend-agent
    title: Mock 页面（可选）
    requires_next: null
    steps: |
      你是 frontend-agent。处理 {{feature_dir}}，按 brief 与 OpenAPI Mock 实现 {{frontend_path}}/ 页面。
      不改 status.yaml。

  frontend.integrate:
    agent: frontend-agent
    title: 联调页面
    requires_next: frontend-agent
    allowed_phase: [tested]
    steps: |
      你是 frontend-agent。处理 {{feature_dir}}，phase 为 tested，next 为 frontend-agent。
      对接真实 API，更新 frontend/integration.md。
      status.yaml → frontend_done，next: test-agent。

  frontend.fix-e2e:
    agent: frontend-agent
    title: E2E 返工
    requires_next: frontend-agent
    allowed_phase: [frontend_done]
    steps: |
      你是 frontend-agent。处理 {{feature_dir}}，phase 为 frontend_done，next 为 frontend-agent。
      读 blockers 与 test/e2e-report.md，修复后自测，清空 blockers。
      保持 frontend_done，next: test-agent，更新 frontend/integration.md。

  frontend.fix-ui:
    agent: frontend-agent
    title: UI 返工
    requires_next: frontend-agent
    allowed_phase: [e2e_verified]
    steps: |
      你是 frontend-agent。处理 {{feature_dir}}，phase 为 e2e_verified，next 为 frontend-agent。
      读 design/ui-review.md 与 blockers，修复 P0，清空 blockers。
      保持 e2e_verified，next: designer-agent，更新 frontend/integration.md。
      若影响 AC，在 integration.md 备注需 test.e2e 复测。

  designer.review:
    agent: designer-agent
    title: UI 走查
    requires_next: designer-agent
    allowed_phase: [e2e_verified]
    steps: |
      你是 designer-agent。处理 {{feature_dir}}，phase 为 e2e_verified，next 为 designer-agent。
      走查页面，填写 design/ui-review.md。
      无 P0 → ui_reviewed，next: product-agent。
      有 P0 → 保持 e2e_verified，blockers，next: frontend-agent。

  designer.rereview:
    agent: designer-agent
    title: UI 复走查
    requires_next: designer-agent
    allowed_phase: [e2e_verified]
    steps: |
      你是 designer-agent。处理 {{feature_dir}}，phase 为 e2e_verified，next 为 designer-agent，blockers 为空。
      复走查 P0 项，更新 design/ui-review.md，通过 → ui_reviewed，next: product-agent。

# status.yaml 的 next → 默认任务（供 pipeline-next 使用）
next_task_map:
  backend-agent:
    contract_ready: backend.implement
    backend_in_progress: backend.implement
  test-agent:
    backend_done: test.api
    frontend_done: test.e2e
  frontend-agent:
    tested: frontend.integrate
    frontend_done: frontend.fix-e2e
    e2e_verified: frontend.fix-ui
  designer-agent:
    e2e_verified: designer.review
  product-agent:
    planned: product.contract
    ui_reviewed: product.accept
