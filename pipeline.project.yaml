# 本仓库项目绑定（Layer B）— 流水线框架通过此文件解析路径与 URL
# 复制 pipeline.project.yaml.example 到新项目并修改；改路径后运行 ./scripts/sync-project-rules.sh

project:
  name: agent-pipeline-demo
  prd:
    primary: PRD-simple.md
  onboarding:
    commander: handoff/pipeline/COMMANDER.md
    mode: greenfield

product:
  inventory: handoff/product/inventory.md
  backlog: handoff/product/backlog.yaml

features:
  root: handoff/features

roadmap:
  glob: handoff/roadmap/phase-*.md
  default_phase_file: handoff/roadmap/phase-1.md
  active_phase: 1
  phase_capacity: 0

apps:
  backend:
    path: apps/api
    stack: express
    dev:
      command: "cd apps/api && npm run dev"
      base_url: http://localhost:3000/api
      cors_origin: http://localhost:5173
  frontend:
    path: apps/web
    stack: vite-react
    dev:
      command: "cd apps/web && npm run dev"
      base_url: http://localhost:5173

conventions:
  api_response:
    success_code: 0

# Hook 提醒策略（.cursor/hooks/pipeline-status-reminder.sh 读取；hooks.json 路径不变）
# 推荐：remind_on_write + stop_followup:false — 仅在写入 status.yaml 时提醒一次，避免 stop 反复续聊
pipeline:
  hooks:
    enabled: true
    remind_on_write: true
    stop_followup: false
    require_new_chat: true
