# 本仓库项目绑定（Layer B）— 流水线框架读此文件解析路径、URL、Hook 策略
# 改 apps.*.path 或 dev URL 后运行：./scripts/sync-project-rules.sh
# 字段说明详见 handoff/conventions/pipeline-project.md

project:                          # 项目元信息与指挥官入口
  name: agent-pipeline-demo       # 项目显示名（日志、文档引用）
  prd:
    primary: PRD-simple.md        # 默认 PRD；/pipeline-product-plan 等任务对齐此文件
  onboarding:
    commander: handoff/pipeline/COMMANDER.md  # 指挥官手册；简写 /pipeline-* 时 Agent 查阅
    mode: greenfield              # 接入模式：本 demo 从 0 规划（见 onboarding-modes.md）

product:                          # 产品待办与存量
  inventory: handoff/product/inventory.md  # 存量能力清单
  backlog: handoff/product/backlog.yaml    # 全量待办队列

features:
  root: handoff/features          # 功能包根目录；格式 {root}/YYYY-MM-DD--slug/

roadmap:                          # 阶段规划
  glob: handoff/roadmap/phase-*.md       # 阶段文件 glob
  default_phase_file: handoff/roadmap/phase-1.md  # product.contract 默认阶段表
  active_phase: 1                 # 当前阶段号
  phase_capacity: 0               # 每阶段 backlog 切片上限；0=不限

apps:                             # 本仓库应用（tasks.yaml 用占位符，勿写死路径）
  backend:
    path: apps/api                # 后端根目录
    stack: express                # 技术栈标识
    dev:
      command: "cd apps/api && npm run dev"  # 本地启动命令
      base_url: http://localhost:3000/api    # API 基址
      cors_origin: http://localhost:5173     # CORS 允许的前端 Origin
  frontend:
    path: apps/web                # 前端根目录
    stack: vite-react             # 技术栈标识
    dev:
      command: "cd apps/web && npm run dev"  # 前端 dev 启动
      base_url: http://localhost:5173        # 前端 dev 地址

conventions:
  api_response:
    success_code: 0               # 统一成功响应 code（见 handoff/conventions/project.md）

# Hook：status.yaml 变更提醒（.cursor/hooks/pipeline-status-reminder.sh；hooks.json 路径不变）
pipeline:
  hooks:
    enabled: true                 # 总开关
    remind_on_write: true         # 写入 status.yaml 后注入下一条 /pipeline-*（推荐）
    stop_followup: false          # false=不在 stop 自动续聊，避免同 Chat 反复提醒
    require_new_chat: true        # 文案要求确认后新开 Chat，勿本会话推进门禁
